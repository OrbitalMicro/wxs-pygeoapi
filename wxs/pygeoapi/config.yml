# Default config for base Docker Image, override via DockerVolume
# mapping with your own config.
server:
    bind:
        host: 0.0.0.0
        port: ${CONTAINER_PORT:-80}
    url: ${PYGEOAPI_SERVER_URL:-http://localhost:5000}
    mimetype: application/json; charset=UTF-8
    encoding: utf-8
    gzip: false
    language: en-US
    cors: true
    pretty_print: true
    admin: ${PYGEOAPI_SERVER_ADMIN:-false}
    limits:
        default_items: 10
        max_items: 50
    # templates: /path/to/templates
    map:
        url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
    ogc_schemas_location: /schemas.opengis.net

logging:
    level: ERROR
    #logfile: /tmp/pygeoapi.log

metadata:
    identification:
        title: Weather Stream OGC API
        description: an API to geospatial data
        keywords:
            - geospatial
            - data
            - api
        keywords_type: theme
        terms_of_service: https://creativecommons.org/licenses/by/4.0/
        url: https://github.com/geopython/pygeoapi
    license:
        name: CC-BY 4.0 license
        url: https://creativecommons.org/licenses/by/4.0/
    provider:
        name: Weather Stream Inc.
        url: https://weatherstream.com
    contact:
        name: Dominik Schneider
        country: USA
        

resources:
    sensors:
        type: collection
        title: Sensors
        description: Sensor locations
        keywords:
            - sensors

        providers:
            - type: feature
              name: extensions.sensors.SensorsPostgreSQLProvider
              data:
                  host: postgres
                  port: 5432
                  dbname: test
                  user: postgres
                  password: postgres
                  search_path: [public]
              id_field: sensor_id
              table: sensors
              geom_field: geom
              time_field: valid_start_datetime
              editable: true  
        
            - type: edr
              name: extensions.sensors.SensorsLocationsEDRProvider
              data:  "/workspaces/wxs-pygeoapi/ecmwf_hres_subset.nc"
              # optionally specify x/y/time fields, else provider will attempt
              # to derive automagically
              x_field: longitude
              y_field: latitude
              feature_provider:
                type: feature
                name: extensions.sensors.SensorsPostgreSQLProvider
                data:
                        host: postgres
                        port: 5432
                        dbname: test
                        user: postgres
                        password: postgres
                        search_path: [public]
                id_field: sensor_id
                table: sensors
                geom_field: geom
                time_field: valid_start_datetime
              
                # optionally specify the coordinate reference system of your dataset
                # else pygeoapi assumes it is WGS84 (EPSG:4326).
              storage_crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
              format:
                name: coveragejson
                mimetype: application/prs.coverage+json; charset=UTF-8


        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
            temporal:
                begin: 
                end: 


