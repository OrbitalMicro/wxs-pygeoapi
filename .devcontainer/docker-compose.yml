services:
  pygeoapi:
    build:
      context: ../pygeoapi
      dockerfile: Dockerfile
    user: vscode
    command: ["run-with-hot-reload"]
    volumes:
      - ..:/workspaces/wxs-pygeoapi
      - ../wxs/pygeoapi/config.yml:/pygeoapi/local.config.yml:ro
      - ../wxs/pygeoapi/extensions:/pygeoapi/extensions
    environment:
      - CONTAINER_PORT=80
      - PYTHONPATH=/pygeoapi
      - PYGEOAPI_OPENAPI=/tmp/local.openapi.yml
      - PYGEOAPI_ASYNCAPI=/tmp/local.asyncapi.yml
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5450:5432"
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s